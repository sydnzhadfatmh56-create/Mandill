<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandil - تولیدکننده تصویر هوش مصنوعی</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">✨ Mandil</h1>
                <p class="subtitle">تبدیل متن به تصویر با هوش مصنوعی</p>
            </div>
        </header>

        <main class="main">
            <!-- قسمت ورودی -->
            <section class="input-section">
                <div class="input-container">
                    <label for="prompt" class="label">توضیح تصویر مورد نظر خود را بنویسید:</label>
                    <textarea 
                        id="prompt" 
                        class="textarea" 
                        placeholder="مثال: یک سگ قهوه‌ای در میان طبیعت به سبک هنری..."
                        rows="4"
                        maxlength="1000"
                    ></textarea>
                    <div class="char-count">
                        <span id="char-count">0</span>/1000
                    </div>
                    <button id="generate-btn" class="btn btn-primary">
                        <span class="btn-text">🎨 تولید تصویر</span>
                        <span class="btn-loading" style="display: none;">⏳ درحال پردازش...</span>
                    </button>
                </div>
            </section>

            <!-- قسمت نمایش تصویر -->
            <section class="result-section">
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>درحال تولید تصویر...</p>
                </div>

                <div id="error" class="error" style="display: none;">
                    <p id="error-message"></p>
                    <button onclick="closeError()" class="btn-close">✕</button>
                </div>

                <div id="success" class="success" style="display: none;">
                    <p id="success-message"></p>
                </div>

                <div id="result" class="result" style="display: none;">
                    <div class="image-container">
                        <img id="generated-image" src="" alt="تصویر تولید شده">
                    </div>
                    <div class="result-actions">
                        <button id="download-btn" class="btn btn-secondary">
                            📥 دانلود تصویر
                        </button>
                        <button id="new-btn" class="btn btn-secondary">
                            ➕ تولید جدید
                        </button>
                    </div>
                </div>
            </section>

            <!-- تاریخچه تصاویر -->
            <section class="history-section">
                <h2 class="section-title">📸 تاریخچه تصاویر</h2>
                <div id="history" class="history-grid">
                    <p class="no-history">هنوز تصویری تولید نشده است</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>ساخته شده با ❤️ به کمک <strong>OpenAI DALL-E</strong></p>
            <p class="version">نسخه 1.0.0</p>
        </footer>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
